apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "dm-sql-to-falkordb.fullname" . }}
  namespace: {{ include "dm-sql-to-falkordb.runnerNamespace" . }}
  labels:
    {{- include "dm-sql-to-falkordb.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "configmaps"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "dm-sql-to-falkordb.fullname" . }}
  namespace: {{ include "dm-sql-to-falkordb.runnerNamespace" . }}
  labels:
    {{- include "dm-sql-to-falkordb.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "dm-sql-to-falkordb.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "dm-sql-to-falkordb.fullname" . }}
