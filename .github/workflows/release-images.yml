name: Release to DockerHub / GHCR

permissions:
  contents: read
  packages: write

on:
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Version tag override (e.g. v0.1.0). Leave empty to use pushed tag or edge.'
        required: false
        default: ''

  push:
    tags: ["v*.*.*"]
    branches:
      - main

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      runner_tags: ${{ steps.vars.outputs.runner_tags }}
      control_plane_tags: ${{ steps.vars.outputs.control_plane_tags }}
    steps:
      - name: Set up variables
        id: vars
        run: |
          VERSION="${{ github.event.inputs.version_override }}"
          
          if [[ -z "$VERSION" ]]; then
            if [[ "${{ github.event_name }}" == "push" ]] && [[ "${{ github.ref }}" == refs/tags/* ]]; then
              VERSION="${{ github.ref_name }}"
            else
              VERSION="edge"
            fi
          fi
          
          if [[ "$VERSION" == "edge" ]]; then
            echo "runner_tags=falkordb/dm-sql-to-falkordb-runner:edge,ghcr.io/falkordb/dm-sql-to-falkordb-runner:edge" >> $GITHUB_OUTPUT
            echo "control_plane_tags=falkordb/dm-sql-to-falkordb-control-plane:edge,ghcr.io/falkordb/dm-sql-to-falkordb-control-plane:edge" >> $GITHUB_OUTPUT
          else
            echo "runner_tags=falkordb/dm-sql-to-falkordb-runner:latest,falkordb/dm-sql-to-falkordb-runner:${VERSION},ghcr.io/falkordb/dm-sql-to-falkordb-runner:latest,ghcr.io/falkordb/dm-sql-to-falkordb-runner:${VERSION}" >> $GITHUB_OUTPUT
            echo "control_plane_tags=falkordb/dm-sql-to-falkordb-control-plane:latest,falkordb/dm-sql-to-falkordb-control-plane:${VERSION},ghcr.io/falkordb/dm-sql-to-falkordb-control-plane:latest,ghcr.io/falkordb/dm-sql-to-falkordb-control-plane:${VERSION}" >> $GITHUB_OUTPUT
          fi

  build-and-push:
    needs: prepare
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    env:
      RUNNER_BASE_TAGS: ${{ needs.prepare.outputs.runner_tags }}
      CONTROL_PLANE_BASE_TAGS: ${{ needs.prepare.outputs.control_plane_tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute arch tags
        run: |
          RUNNER_ARCH_TAGS=$(echo "$RUNNER_BASE_TAGS" | awk -v arch="${{ matrix.arch }}" -F',' '{for(i=1;i<=NF;i++){printf "%s-%s", $i, arch; if(i<NF) printf ","}}')
          echo "RUNNER_ARCH_TAGS=$RUNNER_ARCH_TAGS" >> $GITHUB_ENV
          
          CP_ARCH_TAGS=$(echo "$CONTROL_PLANE_BASE_TAGS" | awk -v arch="${{ matrix.arch }}" -F',' '{for(i=1;i<=NF;i++){printf "%s-%s", $i, arch; if(i<NF) printf ","}}')
          echo "CP_ARCH_TAGS=$CP_ARCH_TAGS" >> $GITHUB_ENV
          
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            echo "TRIVY_RUNNER_TAG=$(echo "$RUNNER_BASE_TAGS" | cut -d',' -f1)-amd64" >> $GITHUB_ENV
            echo "TRIVY_CP_TAG=$(echo "$CONTROL_PLANE_BASE_TAGS" | cut -d',' -f1)-amd64" >> $GITHUB_ENV
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push runner image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/runner.Dockerfile
          push: true
          platforms: linux/${{ matrix.arch }}
          tags: ${{ env.RUNNER_ARCH_TAGS }}

      - name: Build and push control-plane image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./control-plane/Dockerfile
          push: true
          platforms: linux/${{ matrix.arch }}
          tags: ${{ env.CP_ARCH_TAGS }}

      - name: Run Trivy scanner (runner)
        if: matrix.arch == 'amd64'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.TRIVY_RUNNER_TAG }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'
          
      - name: Run Trivy scanner (control-plane)
        if: matrix.arch == 'amd64'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.TRIVY_CP_TAG }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'

  publish-manifest:
    needs: [build-and-push, prepare]
    runs-on: ubuntu-latest
    env:
      RUNNER_BASE_TAGS: ${{ needs.prepare.outputs.runner_tags }}
      CONTROL_PLANE_BASE_TAGS: ${{ needs.prepare.outputs.control_plane_tags }}
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest lists
        run: |
          IFS=',' read -ra R_TAGS <<< "$RUNNER_BASE_TAGS"
          for TAG in "${R_TAGS[@]}"; do
            docker buildx imagetools create -t "$TAG" "${TAG}-amd64" "${TAG}-arm64"
          done
          
          IFS=',' read -ra CP_TAGS <<< "$CONTROL_PLANE_BASE_TAGS"
          for TAG in "${CP_TAGS[@]}"; do
            docker buildx imagetools create -t "$TAG" "${TAG}-amd64" "${TAG}-arm64"
          done

  publish-helm-chart:
    needs: [build-and-push, prepare]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4.2.0
        with:
          version: v3.14.0

      - name: Install yq
        run: |
          YQ_VERSION="v4.50.1"
          YQ_BINARY="yq_linux_amd64"
          wget -qO /tmp/yq "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/${YQ_BINARY}"
          echo "c7a1278e6bbc4924f41b56db838086c39d13ee25dcb22089e7fbf16ac901f0d4  /tmp/yq" | sha256sum -c -
          sudo mv /tmp/yq /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq

      - name: Set chart version
        run: |
          if [[ "${{ github.ref }}" =~ ^refs/tags/v ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"  # Remove 'v' prefix
            echo "CHART_VERSION=$VERSION" >> $GITHUB_ENV
            echo "Publishing version: $VERSION"
          else
            # For main branch or dispatch without tag, use version from Chart.yaml
            VERSION=$(yq '.version' deploy/helm/dm-sql-to-falkordb/Chart.yaml)
            echo "CHART_VERSION=$VERSION" >> $GITHUB_ENV
            echo "Publishing version from Chart.yaml: $VERSION"
          fi

      - name: Update chart version if tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          yq -i ".version = \"${{ env.CHART_VERSION }}\"" deploy/helm/dm-sql-to-falkordb/Chart.yaml
          yq -i ".appVersion = \"${{ env.CHART_VERSION }}\"" deploy/helm/dm-sql-to-falkordb/Chart.yaml

      - name: Package Helm chart
        run: |
          helm package deploy/helm/dm-sql-to-falkordb --destination .helm-charts

      - name: Checkout helm-charts repository
        uses: actions/checkout@v4
        with:
          repository: FalkorDB/helm-charts
          token: ${{ secrets.GHCR_TOKEN }}
          path: helm-charts-repo

      - name: Copy chart to helm-charts repository
        run: |
          mkdir -p helm-charts-repo/charts
          cp .helm-charts/*.tgz helm-charts-repo/charts/
          cd helm-charts-repo
          
          # Update index
          helm repo index charts --url https://falkordb.github.io/helm-charts
          
          # Commit and push with retry logic
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add charts/
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "feat(helm): update dm-sql-to-falkordb chart to version ${{ env.CHART_VERSION }}"
            
            # Retry push up to 3 times in case of conflicts
            for i in {1..3}; do
              if git push; then
                echo "✅ Chart successfully pushed to helm-charts repository"
                break
              else
                if [ $i -lt 3 ]; then
                  echo "Push failed, retrying... (attempt $i/3)"
                  # Get the default branch name
                  DEFAULT_BRANCH=$(git remote show origin | grep 'HEAD branch' | cut -d' ' -f5)
                  if git pull --rebase origin ${DEFAULT_BRANCH}; then
                    echo "Rebase successful, retrying push..."
                    sleep 2
                  else
                    echo "❌ Failed to rebase - conflicts detected"
                    git rebase --abort
                    exit 1
                  fi
                else
                  echo "❌ Failed to push after 3 attempts"
                  exit 1
                fi
              fi
            done
          fi

      - name: Upload package as artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: .helm-charts/*.tgz
          retention-days: 30
